services:
  - type: web
    name: hostal-real-la-molina
    env: php
    region: oregon
    plan: starter
    buildCommand: composer install --optimize-autoloader --no-dev && npm ci --production && npm run build
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    healthCheckPath: /
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: LOG_CHANNEL
        value: stderr
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database

databases:
  - name: hostal-mysql
    plan: starter
    databaseName: hostal_real_la_molina
    user: hostal_user

